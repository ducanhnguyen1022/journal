<div class="posts">
  {% for post in site.posts %}
    <div class="post-item" style="display: flex; align-items: baseline; margin-bottom: 1rem;">
      <time style="min-width: 120px; color: #666; font-family: monospace;">
        {{ post.date | date: "%b %d, %Y" }}
      </time>
      <a href="{{ post.url | relative_url }}" style="font-weight: bold;">
        {{ post.title }}
      </a>
    </div>
  {% endfor %}
</div>
