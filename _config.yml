title: AnhNguyenNote
description: Ghi chú cá nhân từ Zettel Notes
remote_theme: riggraz/no-style-please

# Thêm plugin SEO để cấu hình noindex bên dưới có hiệu lực
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag 

# Màu sắc chủ đạo (giống bản demo)
accent: "#222" 

# Chặn tìm kiếm (yêu cầu jekyll-seo-tag)
robots_noindex: true
seo:
  robot: noindex

# Điều hướng giống hệt riggraz.dev
navigation:
  - { title: "Blog", url: "/" }
  - { title: "About", url: "/about/" }
